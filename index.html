<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaciLink — Meaningful Alumni Connections</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" href="./favicon.ico">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NaciLink">
</head>
<body>
  <!-- Login Gate -->
  <div class="login-gate" id="login-gate">
    <div class="login-card">
      <div class="login-logo">
        <img src="./assets/nacilink-logo.png" alt="NaciLink — Meaningful Alumni Connections" class="login-logo-img" style="max-width:320px;border-radius:12px;">
      </div>
      <p class="login-subtitle">Enter access code</p>
      <!-- Desktop: text input -->
      <div class="login-desktop" id="login-desktop">
        <div class="pin-dots" id="pin-dots-desktop">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div class="login-input-wrap">
          <input type="password" inputmode="numeric" pattern="[0-9]*" id="login-code" class="login-input" placeholder="Enter code" autocomplete="off" maxlength="4">
        </div>
      </div>
      <!-- Mobile: keypad -->
      <div class="login-mobile" id="login-mobile">
        <div class="pin-dots" id="pin-dots-mobile">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div class="keypad" id="keypad">
          <button class="key" data-key="1">1</button>
          <button class="key" data-key="2">2</button>
          <button class="key" data-key="3">3</button>
          <button class="key" data-key="4">4</button>
          <button class="key" data-key="5">5</button>
          <button class="key" data-key="6">6</button>
          <button class="key" data-key="7">7</button>
          <button class="key" data-key="8">8</button>
          <button class="key" data-key="9">9</button>
          <button class="key key-blank" disabled></button>
          <button class="key" data-key="0">0</button>
          <button class="key key-delete" data-key="delete">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
          </button>
        </div>
      </div>
      <p class="login-error hidden" id="login-error">Invalid code</p>
      <p class="login-notice">Contains protected alumni information.<br>Authorized personnel only.</p>
    </div>
  </div>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="./assets/nacilink-emblem.png" alt="NaciLink" class="logo-img" style="width:36px;height:36px;border-radius:8px;">
      <div class="sidebar-title">
        <span class="title-text">NaciLink</span>
      </div>
    </div>

    <!-- Search -->
    <div class="sidebar-search" id="sidebar-search">
      <button class="search-trigger" id="search-trigger">
        <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
        <span>Find an alumnus...</span>
      </button>
      <div class="search-active hidden" id="search-active">
        <div class="search-input-wrap">
          <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
          <input type="text" id="search-input" placeholder="Name, specialty, or city..." autocomplete="off">
          <button class="search-close" id="search-close">
            <svg class="icon"><use href="./css/icons.svg#x"></use></svg>
          </button>
        </div>
        <div class="search-results hidden" id="search-results"></div>
      </div>
    </div>

    <!-- Nav Items -->
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="queue">
        <svg class="icon"><use href="./css/icons.svg#bell"></use></svg>
        <span class="nav-label">Queue</span>
        <span class="nav-badge" id="queue-badge">0</span>
      </button>
      <button class="nav-item" data-view="directory">
        <svg class="icon"><use href="./css/icons.svg#users"></use></svg>
        <span class="nav-label">Alumni</span>
      </button>
      <button class="nav-item" data-view="projects">
        <svg class="icon"><use href="./css/icons.svg#folder"></use></svg>
        <span class="nav-label">Projects</span>
      </button>
      <button class="nav-item" data-view="dashboard">
        <svg class="icon"><use href="./css/icons.svg#layout-dashboard"></use></svg>
        <span class="nav-label">Dashboard</span>
      </button>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <p class="disclaimer">NaciLink &middot; WesternU Health Sciences<br>Alumni data sourced from public federal NPPES database. Personal details are voluntary and revocable.</p>
    </div>
  </aside>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-item active" data-view="queue">
      <span class="mobile-nav-icon-wrap">
        <svg class="icon"><use href="./css/icons.svg#bell"></use></svg>
        <span class="mobile-badge hidden" id="mobile-queue-badge">0</span>
      </span>
      <span class="mobile-nav-label">Queue</span>
    </button>
    <button class="mobile-nav-item" data-view="directory">
      <svg class="icon"><use href="./css/icons.svg#users"></use></svg>
      <span class="mobile-nav-label">Alumni</span>
    </button>
    <button class="mobile-nav-item" data-view="projects">
      <svg class="icon"><use href="./css/icons.svg#folder"></use></svg>
      <span class="mobile-nav-label">Projects</span>
    </button>
    <button class="mobile-nav-item" data-view="dashboard">
      <svg class="icon"><use href="./css/icons.svg#layout-dashboard"></use></svg>
      <span class="mobile-nav-label">Dashboard</span>
    </button>
    <button class="mobile-nav-item" id="mobile-search-btn">
      <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
      <span class="mobile-nav-label">Search</span>
    </button>
  </nav>

  <!-- Mobile Search Overlay -->
  <div class="mobile-search-overlay hidden" id="mobile-search-overlay">
    <div class="mobile-search-header">
      <svg class="icon"><use href="./css/icons.svg#search"></use></svg>
      <input type="text" id="mobile-search-input" placeholder="Name, specialty, or city..." autocomplete="off">
      <button id="mobile-search-close">
        <svg class="icon"><use href="./css/icons.svg#x"></use></svg>
      </button>
    </div>
    <div class="mobile-search-results" id="mobile-search-results"></div>
  </div>

  <!-- Outreach Panel Overlay -->
  <div class="outreach-overlay hidden" id="outreach-overlay"></div>
  <div class="outreach-panel hidden" id="outreach-panel"></div>

  <!-- Main Content -->
  <main class="main-content" id="main">
    <div class="content-wrap">
      <div id="root"></div>
    </div>
  </main>

  <!-- Chart.js from CDN (only dep) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
